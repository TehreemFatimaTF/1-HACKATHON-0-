version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: ai_employee_postgres
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-odoo_secure_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ai-employee-network

  # Odoo Accounting System
  odoo:
    image: odoo:19
    container_name: ai_employee_odoo
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8069:8069"
      - "8072:8072"
    environment:
      - HOST=postgres
      - USER=odoo
      - PASSWORD=${POSTGRES_PASSWORD:-odoo_secure_password}
    volumes:
      - odoo-data:/var/lib/odoo
      - ./odoo-config:/etc/odoo
    restart: unless-stopped
    networks:
      - ai-employee-network

  # AI Employee Application
  ai-employee:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_employee_app
    depends_on:
      - odoo
      - postgres
    environment:
      # Odoo Configuration
      - ODOO_URL=http://odoo:8069
      - ODOO_DB=${ODOO_DB:-odoo}
      - ODOO_USERNAME=${ODOO_USERNAME}
      - ODOO_PASSWORD=${ODOO_PASSWORD}

      # Gmail Configuration
      - GMAIL_CREDENTIALS_PATH=/app/credentials/credentials.json
      - GMAIL_TOKEN_PATH=/app/credentials/token.json

      # Social Media Configuration
      - FACEBOOK_ACCESS_TOKEN=${FACEBOOK_ACCESS_TOKEN}
      - FACEBOOK_PAGE_ID=${FACEBOOK_PAGE_ID}
      - INSTAGRAM_ACCESS_TOKEN=${INSTAGRAM_ACCESS_TOKEN}
      - INSTAGRAM_ACCOUNT_ID=${INSTAGRAM_ACCOUNT_ID}
      - TWITTER_API_KEY=${TWITTER_API_KEY}
      - TWITTER_API_SECRET=${TWITTER_API_SECRET}
      - TWITTER_ACCESS_TOKEN=${TWITTER_ACCESS_TOKEN}
      - TWITTER_ACCESS_SECRET=${TWITTER_ACCESS_SECRET}

      # General Settings
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - AUTONOMOUS_MODE=${AUTONOMOUS_MODE:-false}
    volumes:
      - ./Logs:/app/Logs
      - ./Needs_Action:/app/Needs_Action
      - ./Done:/app/Done
      - ./Plans:/app/Plans
      - ./Inbox:/app/Inbox
      - ./credentials:/app/credentials:ro
    restart: unless-stopped
    networks:
      - ai-employee-network

volumes:
  postgres-data:
  odoo-data:

networks:
  ai-employee-network:
    driver: bridge
